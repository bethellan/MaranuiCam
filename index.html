<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Maranui SLSC – Lyall Bay Webcam</title>
  <meta name="theme-color" content="#C8102E" />
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maranui Webcam">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <img src="assets/logos/maranui-script.jpg" alt="Maranui S.L.S.C." class="logo-script" />
      <img src="assets/logos/maranui-wings.jpg" alt="" aria-hidden="true" class="logo-wings-watermark" />
    </div>
    <div class="accent-line"></div>
  </header>

  <main>
    <section class="player-wrap" id="playerWrap" aria-label="Live beach webcam">
      <div class="overlay top"><img src="assets/logos/maranui-script.jpg" alt="Maranui S.L.S.C."></div>
      <div class="overlay bottom"><img src="assets/logos/maranui-wings.jpg" alt="Maranui emblem"></div>
      <div class="ratio">
        <iframe id="ytFrame" title="Maranui Lyall Bay Live"
          src="https://www.youtube.com/embed/c6uv1mWhWek?autoplay=1&mute=1&playsinline=1&modestbranding=1&rel=0"
          allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
    </section>

    <section class="conditions" id="conditionsPanel">
      <h2>Current Conditions – Lyall Bay</h2>
      <div id="conditionsContent">Loading live data…</div>
      <div id="conditionsUpdated" class="updated"></div>
      <details class="source-note"><summary>Data sources</summary><p>Wind & waves: Open‑Meteo • Tide heights: WorldTides (demo)</p></details>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-logos">
      <img src="assets/logos/maranui-script.jpg" alt="Maranui S.L.S.C.">
      <img src="assets/logos/maranui-cap.jpg" alt="Surf cap">
      <img src="assets/logos/maranui-wings.jpg" alt="Wings emblem">
    </div>
    <p>Unofficial viewer for Maranui SLSC • Built for Andrew • © 2025</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
