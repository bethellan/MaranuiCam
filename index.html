<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Maranui SLSC – Lyall Bay Webcam</title>
  <meta name="theme-color" content="#C8102E" />
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maranui Webcam">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <img src="assets/logos/maranui-script.jpg" alt="Maranui S.L.S.C." class="logo-script" />
      <img src="assets/logos/maranui-wings.jpg" alt="" aria-hidden="true" class="logo-wings-watermark" />
    </div>
    <div class="accent-line"></div>
  </header>

  <main>
    <section class="player-wrap" id="playerWrap" aria-label="Live beach webcam">
      <!-- Enlarged, repeating winged-M overlay bands (top & bottom) -->
      <div class="overlay top"></div>
      <div class="overlay bottom"></div>

      <div class="ratio">
        <iframe
          id="ytFrame"
          title="Maranui Lyall Bay Live"
          src="https://www.youtube.com/embed/c6uv1mWhWek?autoplay=1&mute=1&playsinline=1&modestbranding=1&rel=0"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
    </section>

    <section class="conditions" id="conditionsPanel">
      <h2>Current Conditions – Lyall Bay</h2>
      <div id="snapshot">Loading live data…</div>
      <div id="tideExtras"></div>
      <div id="updated" class="updated"></div>
      <div class="table-wrap">
        <table id="hourlyTable" aria-label="Hourly surf conditions">
          <thead>
            <tr>
              <th>Time</th>
              <th>Tide (↑/↓)</th>
              <th>Height (m)</th>
              <th>Wind (km/h)</th>
              <th>Dir</th>
              <th>Waves (m)</th>
              <th>Period (s)</th>
              <th>Optimal</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-logos">
      <img src="assets/logos/maranui-script.jpg" alt="Maranui S.L.S.C.">
      <img src="assets/logos/maranui-cap.jpg" alt="Surf cap">
      <img src="assets/logos/maranui-wings.jpg" alt="Wings emblem">
    </div>
    <p>Unofficial viewer for Maranui SLSC • Built for Andrew • © 2025</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
