<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maranui Webcam v6.4.6 — Surf & Airport Cams</title>
  <meta name="theme-color" content="#e63946" />
  <link rel="stylesheet" href="style.css?v=6.4.3" />
  <script defer src="script.js?v=6.4.6"></script>
</head>
<body>
  <header class="site-header">
    <div class="logo-row">
      <img src="assets/maranui-wing-band.png" alt="Maranui wings" class="header-logo" />
      <h1 class="site-title">Maranui Surf Life Saving Club — Live Cams & Conditions</h1>
    </div>
  </header>

  <!-- Top info chips -->
  <div class="info-chips">
    <div id="sunChip" class="chip sun">🌅 — 🌇 —</div>
    <div id="tideChip" class="chip tide">🌊 Loading...</div>
  </div>

  <main class="content">
    <section class="camera-section">
      <div class="cam">
        <div class="overlay top"></div>
        <iframe
          id="liveFrame"
          title="Lyall Bay Live Surf Camera"
          src="https://www.youtube.com/embed/c6uv1mWhWek?autoplay=1&mute=1&playsinline=1&rel=0&enablejsapi=1"
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen
          playsinline
          frameborder="0">
        </iframe>
        <div class="overlay bottom"></div>
      </div>

      <div class="switch-row">
        <button id="camToggle" class="toggle toggle--surf" type="button">
          <span class="toggle__left">🏖️ Surf Cam</span>
          <span class="toggle__divider">⇄</span>
          <span class="toggle__right">✈️ Airport Cam</span>
        </button>
      </div>
    </section>

    <!-- 24-hour forecast table -->
    <section class="conditions">
      <h2 class="panel-title">24-Hour Forecast — Lyall Bay (metric)</h2>
      <div class="table-scroll">
        <table id="condTable" class="cond-table">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="status-row">
        <span id="dataStatus" class="status-chip">Initialising...</span>
        <span id="updatedAt" class="status-chip faint">—</span>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      Maranui Webcam <strong>v6.4.6</strong> © Maranui Surf Life Saving Club ·
      Data from Open-Meteo & MetService (30 min refresh)
    </p>
  </footer>

  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(rs => rs.forEach(r => r.unregister()))
      .finally(() => navigator.serviceWorker.register('sw.js?v=6.4.3').catch(console.warn));
  }
  </script>
</body>
</html>
